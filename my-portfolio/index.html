<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Dev Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo" id="nav-name"></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#hero">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-particles" id="particles"></div>
    <div class="hero-content">
      <img id="hero-image" class="hero-avatar" src="" alt="Profile" />
      <h1 id="hero-name"></h1>
      <h2 id="hero-title"></h2>
      <p id="hero-tagline"></p>
      <div class="hero-buttons">
        <a href="#projects" class="btn btn-primary">View My Work</a>
        <a href="#" id="hero-resume" class="btn btn-secondary">Resume</a>
      </div>
      <div class="hero-socials" id="hero-socials"></div>
    </div>
    <div class="scroll-indicator">
      <i class="fas fa-chevron-down"></i>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <div class="container">
      <h2 class="section-title">About Me</h2>
      <div class="about-content">
        <p id="about-text"></p>
      </div>
    </div>
  </section>

  <!-- SKILLS -->
  <section id="skills">
    <div class="container">
      <h2 class="section-title">Skills</h2>
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </section>

  <!-- PROJECTS -->
  <section id="projects">
    <div class="container">
      <h2 class="section-title">Projects</h2>
      <div class="filter-buttons" id="filter-buttons"></div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- EXPERIENCE -->
  <section id="experience">
    <div class="container">
      <h2 class="section-title">Experience & Game Jams</h2>
      <div class="timeline" id="timeline"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <div class="container">
      <h2 class="section-title">Get In Touch</h2>
      <p class="contact-text">Interested in working together? Let's connect!</p>
      <div class="contact-socials" id="contact-socials"></div>
      <a id="contact-email" href="" class="btn btn-primary btn-large">
        <i class="fas fa-envelope"></i> Send Email
      </a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span>. All rights reserved.</p>
  </footer>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
